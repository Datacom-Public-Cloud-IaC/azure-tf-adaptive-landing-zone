# All Datacom ALZ IaC repositories — for AI-assisted development context.
# Use: dcrsync build -m manifests/development-iac.yaml -t vendor/
#
# This pulls every known IaC repo for maximum AI reasoning context.
# For customer deployments use deployment-baseline.yaml (smaller, deployment-scoped).

